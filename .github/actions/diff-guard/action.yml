name: diff-guard
description: |
  Compare a freshly built vuls.db against a baseline pulled from a container
  registry. Runs `vuls diff detection` (against two vuls0 binaries: master HEAD
  and a pinned older commit) and `vuls diff db`, emitting step summaries and
  failing the job if any check exceeds its configured threshold.

  All guard steps are kept inside this composite action so the caller only
  needs a single `uses:` step to run the whole gate.

  Sanity-check strategy (the order steps run in):
    1. Detection against vuls0 master HEAD — a large detection gap almost
       always means the DB should not ship.
    2. Detection against a slightly older pinned vuls0 binary — catches
       regressions that only surface against past vuls0 versions.
    3. `vuls diff db` last — structural changes to the extracted data can
       legitimately inflate the raw DB diff even when detection is stable.
       If detection shows near-zero change but only `diff db` fails, the
       failure is easier to interpret because the earlier detection checks
       already established detection stability.

  Failure-handling strategy:
    All three diff steps record their exit code as a step output (`rc`) and
    continue rather than aborting the job. A final aggregation step reads
    those outputs, prints a summary table, and fails the job if any check
    tripped its threshold. This guarantees that one failing check does not
    hide the signals from the others — when triage is needed the step
    summary always contains all three diffs.

    To make this guarantee robust, each diff step keeps `set +e` in
    effect for the *entire* step (rather than re-enabling `set -e` after
    capturing rc), so a stray failure on the summary-write path cannot
    abort the step before its `$GITHUB_OUTPUT` line is written. Reports
    are emitted via `if [ -s <file> ]; then head ...; else placeholder;`
    so a missing/empty report file is surfaced as a placeholder rather
    than crashing the step. Each diff step additionally carries
    `continue-on-error: true` so a signal-kill or other unexpected
    abort of one diff step does not skip the rest; downstream steps
    still run via the default success() gate (because
    `continue-on-error` re-maps a failure outcome to a success-style
    conclusion), capture their own rc, and the aggregator surfaces
    any genuinely missing rc as MISSING.

    (We would prefer to also wrap the aggregator in `if: always()` so
    a failure in a non-`continue-on-error` setup step — install /
    prepare-scan-results — would still produce a summary. But the
    composite-action manifest loader switches to a legacy code path
    once any step carries `continue-on-error`, and the legacy loader
    rejects status-check function calls in `if:` even on the terminal
    step. The trade-off is acceptable: setup-step failures are
    genuine bugs the operator sees in the run UI directly anyway.)

    Exit-code policy: the aggregation step preserves the *first* non-zero
    rc in step order (master HEAD → older binary → diff db) as the
    action's exit code, matching the rc the old `exit "$rc"` design would
    have returned in both single- and multi-failure cases. A missing
    output (the upstream step crashed before recording its rc) is
    rendered as `MISSING` in the summary table, surfaced as `?` in the
    diagnostic line, and counted as failure (exit rc=1).

inputs:
  target_db:
    description: Path to the freshly built vuls.db to validate.
    required: true
  baseline_repository:
    description: OCI reference (repo:tag) to fetch the baseline vuls.db from.
    required: true
  db_change_rate_threshold:
    description: "`vuls diff db` default change rate (%) threshold per ecosystem."
    required: true
  db_change_rate_threshold_overrides:
    description: |
      Per-ecosystem overrides of the `vuls diff db` change rate threshold.
      One "<ecosystem>=<rate>" entry per line (e.g. "ubuntu:26.04=25");
      blank/whitespace-only lines are dropped. Empty value means "no
      overrides" — every ecosystem uses db_change_rate_threshold.
    required: false
    default: ""
  detection_change_rate_threshold:
    description: "`vuls diff detection` default change rate (%) threshold per scan result."
    required: true
  detection_change_rate_threshold_overrides:
    description: |
      Per-file overrides of the `vuls diff detection` change rate threshold.
      One "<file-basename>=<rate>" entry per line (e.g. "debian_13=8") where
      the basename is the scan-result file name without ".json".
      Blank/whitespace-only lines are dropped.
    required: false
    default: ""
  integration_ref:
    description: vulsio/integration commit SHA to pin scan-result fixtures to.
    required: false
    default: 41190b01b96b89028946e545b8ed41005321e62e
  vuls0_old_ref:
    description: future-architect/vuls commit SHA for the older-binary detection check.
    required: false
    default: 4cc910824a2880fbfb322dd4e9d94b68558bed57

runs:
  using: composite
  steps:
    - name: Record vuls (vuls2) binary metadata
      shell: bash
      run: |
        # Diff behavior (thresholds, output format) can change across vuls2
        # nightlies, so capture the exact binary being used to drive
        # `vuls diff ...` alongside the vuls0 binaries recorded below.
        {
          echo "## vuls (vuls2) driving diff checks"
          echo '```text'
          go version -m "$(command -v vuls)" 2>&1 | awk '$1=="mod" && $2=="github.com/MaineK00n/vuls2"' || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Fetch baseline vuls.db
      shell: bash
      run: vuls db fetch --dbpath ./baseline.db --repository "${{ inputs.baseline_repository }}" --no-progress

    - name: Install vuls0 (future-architect/vuls master)
      shell: bash
      run: |
        mkdir -p /tmp/vuls0-bin
        GOBIN=/tmp/vuls0-bin go install github.com/future-architect/vuls/cmd/vuls@master
        mv /tmp/vuls0-bin/vuls /tmp/vuls0-bin/vuls0
        echo "VULS0=/tmp/vuls0-bin/vuls0" >> "$GITHUB_ENV"

        # `go version -m` reads the module metadata Go embeds into every
        # binary; the `mod` line's pseudo-version carries both the build
        # timestamp and short commit hash
        # (e.g. `v0.38.7-0.YYYYMMDDHHMMSS-<shorthash>`).
        {
          echo "## vuls0 under test (master HEAD)"
          echo '```text'
          go version -m /tmp/vuls0-bin/vuls0 2>&1 | awk '$1=="mod" && $2=="github.com/future-architect/vuls"' || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    # Pin vulsio/integration to a specific commit so scan-result fixtures used
    # by `vuls diff detection` do not change independently of this repo.
    - name: Check out vulsio/integration (pinned) for scan-result fixtures
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: vulsio/integration
        ref: ${{ inputs.integration_ref }}
        path: integration

    - name: Prepare scan results (vuls2-supported families only)
      shell: bash
      run: |
        mkdir -p ./scan-results
        # Copy all scan results then drop the ones excluded from this vuls2
        # detection diff: Windows (handled by gost) and CentOS — see
        # vuls/detector/detector.go DetectPkgCves switch.
        cp ./integration/data/results/*.json ./scan-results/
        rm -f ./scan-results/windows_*.json ./scan-results/centos_*.json
        ls -1 ./scan-results

        integration_sha=$(git -C ./integration rev-parse HEAD)
        echo "## Scan-result fixtures source" >> "$GITHUB_STEP_SUMMARY"
        echo "- vulsio/integration @ \`${integration_sha}\`" >> "$GITHUB_STEP_SUMMARY"

    # Centralizes the multi-line `_overrides` input parsing for all three
    # diff steps below. Rule: `awk 'NF'` drops blank/whitespace-only lines
    # (NF is 0 for them); `paste -sd, -` joins survivors with ",".
    # Whitespace around each entry is intentionally NOT trimmed here —
    # vuls2 trims around the "=" itself in override.Parse. An empty result
    # is forwarded as-is: vuls2's StringSlice flag parses "" into an empty
    # override list, i.e. the no-overrides default.
    - name: Parse threshold overrides
      id: parse_overrides
      shell: bash
      env:
        DETECTION_OVERRIDES: ${{ inputs.detection_change_rate_threshold_overrides }}
        DB_OVERRIDES: ${{ inputs.db_change_rate_threshold_overrides }}
      run: |
        detection_csv=$(printf '%s' "$DETECTION_OVERRIDES" | awk 'NF' | paste -sd, -)
        db_csv=$(printf '%s' "$DB_OVERRIDES" | awk 'NF' | paste -sd, -)
        # printf, not echo: a value beginning with `-` (e.g. `-n`) or
        # containing backslashes is written verbatim, avoiding echo's
        # implementation-defined option/escape handling.
        printf '%s\n' "detection_csv=${detection_csv}" >> "$GITHUB_OUTPUT"
        printf '%s\n' "db_csv=${db_csv}" >> "$GITHUB_OUTPUT"

    - name: Diff detection between baseline and target DBs
      id: diff_detection_master
      # See the `Failure-handling strategy` section in the action's
      # description for why this is `continue-on-error: true` rather
      # than `if: always()`.
      continue-on-error: true
      shell: bash
      env:
        TARGET_DB: ${{ inputs.target_db }}
        DETECTION_CHANGE_RATE_THRESHOLD: ${{ inputs.detection_change_rate_threshold }}
        OVERRIDES_CSV: ${{ steps.parse_overrides.outputs.detection_csv }}
      run: |
        # No `set -e` after `rc=$?` — the rest of the step must reach
        # the final `echo "rc=..." >> $GITHUB_OUTPUT` so the aggregator
        # can read it.
        set +e
        set -o pipefail

        # `$OVERRIDES_CSV` comes from the `Parse threshold overrides`
        # step. Passed verbatim: vuls2's StringSlice flag parses an empty
        # value into an empty override list, so the no-overrides path
        # needs no special-casing here.
        vuls diff detection \
          ./scan-results \
          ./baseline.db "$VULS0" \
          "$TARGET_DB" "$VULS0" \
          --change-rate-threshold "$DETECTION_CHANGE_RATE_THRESHOLD" \
          --change-rate-threshold-override "$OVERRIDES_CSV" \
          | tee ./diff-detection-report.md
        rc=$?

        echo "---" >> "$GITHUB_STEP_SUMMARY"
        echo "## Diff detection (vuls0 master HEAD) — rc=${rc}" >> "$GITHUB_STEP_SUMMARY"
        if [ -s ./diff-detection-report.md ]; then
          head -n 100 ./diff-detection-report.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "_(no report content — diff exited before producing output)_" >> "$GITHUB_STEP_SUMMARY"
        fi
        # Defer failure: final "Aggregate diff results" step exits non-zero
        # if any diff tripped its threshold, so that all three diffs always
        # run and their summaries are available for triage.
        echo "rc=${rc}" >> "$GITHUB_OUTPUT"

    # Additional check with a slightly older vuls0 binary (pinned commit) to
    # catch regressions that only surface against past vuls0 versions.
    - name: Install vuls0 for older-binary check (pinned commit)
      shell: bash
      env:
        VULS0_OLD_REF: ${{ inputs.vuls0_old_ref }}
      run: |
        mkdir -p /tmp/vuls0-old-bin
        GOBIN=/tmp/vuls0-old-bin go install "github.com/future-architect/vuls/cmd/vuls@${VULS0_OLD_REF}"
        mv /tmp/vuls0-old-bin/vuls /tmp/vuls0-old-bin/vuls0-old
        echo "VULS0_OLD=/tmp/vuls0-old-bin/vuls0-old" >> "$GITHUB_ENV"

        {
          echo "## vuls0 under test (older pinned @${VULS0_OLD_REF:0:7})"
          echo '```text'
          go version -m /tmp/vuls0-old-bin/vuls0-old 2>&1 | awk '$1=="mod" && $2=="github.com/future-architect/vuls"' || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Prepare scan results for older-binary check (drop families unsupported by older vuls0)
      shell: bash
      run: |
        # Start from the already-filtered master-HEAD set (windows/centos gone)
        # and additionally remove families the pinned older vuls0 cannot
        # process. This is expressed as a *blacklist* so new families added
        # upstream are retained automatically; only known-broken ones need
        # listing here. Update this set when bumping `vuls0_old_ref`.
        mkdir -p ./scan-results-old
        cp ./scan-results/*.json ./scan-results-old/
        rm -f \
          ./scan-results-old/amazon_*.json \
          ./scan-results-old/debian_*.json \
          ./scan-results-old/leap.json \
          ./scan-results-old/opensuse_*.json \
          ./scan-results-old/sles*.json \
          ./scan-results-old/suse_*.json
        ls -1 ./scan-results-old

    - name: Diff detection with older vuls0 binary (baseline vs target DB)
      id: diff_detection_old
      # See note on diff_detection_master.
      continue-on-error: true
      shell: bash
      env:
        TARGET_DB: ${{ inputs.target_db }}
        DETECTION_CHANGE_RATE_THRESHOLD: ${{ inputs.detection_change_rate_threshold }}
        OVERRIDES_CSV: ${{ steps.parse_overrides.outputs.detection_csv }}
        VULS0_OLD_REF: ${{ inputs.vuls0_old_ref }}
      run: |
        # Stay in `set +e` for the entire step. See note above.
        set +e
        set -o pipefail

        # `$OVERRIDES_CSV` comes from the `Parse threshold overrides`
        # step. See diff_detection_master for the verbatim-pass rationale.
        vuls diff detection \
          ./scan-results-old \
          ./baseline.db "$VULS0_OLD" \
          "$TARGET_DB" "$VULS0_OLD" \
          --change-rate-threshold "$DETECTION_CHANGE_RATE_THRESHOLD" \
          --change-rate-threshold-override "$OVERRIDES_CSV" \
          | tee ./diff-detection-old-report.md
        rc=$?

        echo "---" >> "$GITHUB_STEP_SUMMARY"
        echo "## Diff detection (older pinned vuls0 @${VULS0_OLD_REF:0:7}) — rc=${rc}" >> "$GITHUB_STEP_SUMMARY"
        if [ -s ./diff-detection-old-report.md ]; then
          head -n 100 ./diff-detection-old-report.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "_(no report content — diff exited before producing output)_" >> "$GITHUB_STEP_SUMMARY"
        fi
        # Defer failure to "Aggregate diff results" step. See note above.
        echo "rc=${rc}" >> "$GITHUB_OUTPUT"

    - name: Diff vuls.db against baseline
      id: diff_db
      # See note on diff_detection_master.
      continue-on-error: true
      shell: bash
      env:
        TARGET_DB: ${{ inputs.target_db }}
        DB_CHANGE_RATE_THRESHOLD: ${{ inputs.db_change_rate_threshold }}
        OVERRIDES_CSV: ${{ steps.parse_overrides.outputs.db_csv }}
      run: |
        # Stay in `set +e` for the entire step. See note above.
        set +e
        set -o pipefail

        # `$OVERRIDES_CSV` comes from the `Parse threshold overrides`
        # step. See diff_detection_master for the verbatim-pass rationale.
        vuls diff db ./baseline.db "$TARGET_DB" \
          --change-rate-threshold "$DB_CHANGE_RATE_THRESHOLD" \
          --change-rate-threshold-override "$OVERRIDES_CSV" \
          | tee ./diff-report.md
        rc=$?

        echo "---" >> "$GITHUB_STEP_SUMMARY"
        echo "## Diff vuls.db — rc=${rc}" >> "$GITHUB_STEP_SUMMARY"
        if [ -s ./diff-report.md ]; then
          head -n 300 ./diff-report.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "_(no report content — diff exited before producing output)_" >> "$GITHUB_STEP_SUMMARY"
        fi
        # Defer failure to "Aggregate diff results" step. See note above.
        echo "rc=${rc}" >> "$GITHUB_OUTPUT"

    # See the action description for the full Failure-handling and
    # Exit-code policy. In short: every diff step has run by now and
    # written its rc (or left it MISSING if killed before recording).
    # This step turns the three rc values into a summary table and a
    # single exit code (first non-zero in step order).
    - name: Aggregate diff results
      shell: bash
      env:
        RC_DETECTION_MASTER: ${{ steps.diff_detection_master.outputs.rc }}
        RC_DETECTION_OLD: ${{ steps.diff_detection_old.outputs.rc }}
        RC_DB: ${{ steps.diff_db.outputs.rc }}
      run: |
        status() {
          case "$1" in
            "")  echo "MISSING" ;;
            "0") echo "PASS" ;;
            *)   echo "FAIL" ;;
          esac
        }
        label_master=$(status "${RC_DETECTION_MASTER}")
        label_old=$(status "${RC_DETECTION_OLD}")
        label_db=$(status "${RC_DB}")

        rc_master_disp="${RC_DETECTION_MASTER:-?}"
        rc_old_disp="${RC_DETECTION_OLD:-?}"
        rc_db_disp="${RC_DB:-?}"

        {
          echo "---"
          echo "## Diff guard summary"
          echo ""
          echo "| Check | rc | Status |"
          echo "| --- | --- | --- |"
          echo "| Diff detection (vuls0 master HEAD) | ${rc_master_disp} | ${label_master} |"
          echo "| Diff detection (older pinned vuls0) | ${rc_old_disp} | ${label_old} |"
          echo "| Diff vuls.db | ${rc_db_disp} | ${label_db} |"
        } >> "$GITHUB_STEP_SUMMARY"

        # Map a non-zero recorded rc to the action's exit code:
        # numeric 1..255 → pass through, anything else (empty MISSING,
        # non-numeric, > 255) → 1. The caller's loop only invokes this
        # for empty or non-zero rc, so 0 is unreachable here.
        pick_exit() {
          local v="$1"
          case "$v" in
            "" | *[!0-9]*) echo 1 ;;
            *) [ "$v" -le 255 ] && echo "$v" || echo 1 ;;
          esac
        }

        for rc in "${RC_DETECTION_MASTER}" "${RC_DETECTION_OLD}" "${RC_DB}"; do
          if [ "$rc" != "0" ]; then
            echo "diff guard failed: detection(master)=${rc_master_disp} detection(old)=${rc_old_disp} db=${rc_db_disp}" >&2
            exit "$(pick_exit "$rc")"
          fi
        done
