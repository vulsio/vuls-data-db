name: Cleanup vulsio/vuls-data-db-archive

on:
  workflow_run:
    workflows: [Archive Raw]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup untagged images in vulsio/vuls-data-db-archive
    uses: ./.github/workflows/cleanup.yml
    permissions:
      contents: read
      packages: write
    with:
      package: vuls-data-db-archive
