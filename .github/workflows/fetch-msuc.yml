name: Fetch MSUC

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list-names:
    name: List MSUC target names
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.list.outputs.include }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: list
        run: |
          include="$(jq -c . .github/workflows/msuc-targets.json)"
          echo "include=${include}" >> "$GITHUB_OUTPUT"

  fetch:
    name: Fetch vuls-data-raw-microsoft-msuc ${{ matrix.name }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: [list-names]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-names.outputs.include) }}
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: MaineK00n/vuls-data-update
          ref: main

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Install vuls-data-update
        run: go install ./cmd/vuls-data-update

      - name: Fetch
        run: |
          mkdir vuls-data-raw-microsoft-msuc
          vuls-data-update fetch microsoft-msuc --dir vuls-data-raw-microsoft-msuc ${{ join(matrix.target, ' ') }}

      - name: Create tarball
        run: tar --remove-files -acf vuls-data-raw-microsoft-msuc.tar.zst vuls-data-raw-microsoft-msuc || [[ $? == 1 ]]

      - name: Push ghcr.io/vulsio/vuls-data-db:microsoft-msuc-data-${{ matrix.name }}
        run: vuls-data-update dotgit registry push --force --token ${{ secrets.GITHUB_TOKEN }} ghcr.io/vulsio/vuls-data-db:microsoft-msuc-data-${{ matrix.name }} vuls-data-raw-microsoft-msuc.tar.zst

  commit:
    name: Commit vuls-data-raw-microsoft-msuc
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    if: ${{ success() || failure() }}
    needs: [list-names, fetch]
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls-data-update
        run: go install github.com/MaineK00n/vuls-data-update/cmd/vuls-data-update@main

      - name: Pull ghcr.io/${{ github.repository }}:vuls-data-raw-microsoft-msuc
        run: vuls-data-update dotgit pull --dir . --checkout main ghcr.io/${{ github.repository }}:vuls-data-raw-microsoft-msuc

      - name: Aggregate microsoft-msuc-data-*
        run: |
          include='${{ needs.list-names.outputs.include }}'
          if [[ -z "$include" ]]; then
            echo "::error::list-names output is empty"
            exit 1
          fi
          while read -r name; do
            vuls-data-update dotgit pull --dir . --checkout "" "ghcr.io/${{ github.repository }}:microsoft-msuc-data-${name}"
            if ls "ghcr.io/${{ github.repository }}/microsoft-msuc-data-${name}/"* >/dev/null 2>&1; then
              mv "ghcr.io/${{ github.repository }}/microsoft-msuc-data-${name}/"* "ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc/"
            fi
            rmdir "ghcr.io/${{ github.repository }}/microsoft-msuc-data-${name}"
          done < <(echo "$include" | jq -r '.[].name')

      - name: Set Git config
        run: |
          git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc config gc.auto 0
          if git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc remote | grep -q "^origin$"; then
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc remote set-url origin ghcr.io/${{ github.repository }}:vuls-data-raw-microsoft-msuc
          else
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc remote add origin ghcr.io/${{ github.repository }}:vuls-data-raw-microsoft-msuc
          fi
          git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc config user.email "action@github.com"
          git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc config user.name "GitHub Action"

      - name: Commit
        run: |
          if [[ -n $(git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc status --porcelain) ]]; then
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc add .
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc commit -m "update" -m "GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ job.check_run_id }}"
          fi

      - name: Create dotgit tarball
        run: vuls-data-update dotgit compress ghcr.io/${{ github.repository }}/vuls-data-raw-microsoft-msuc

      - name: Push ghcr.io/${{ github.repository }}:vuls-data-raw-microsoft-msuc
        run: vuls-data-update dotgit registry push --force --token ${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ github.repository }}:vuls-data-raw-microsoft-msuc vuls-data-raw-microsoft-msuc.tar.zst

  cleanup:
    name: Cleanup microsoft-msuc-data-*
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [commit]
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install vuls-data-update
        run: go install github.com/MaineK00n/vuls-data-update/cmd/vuls-data-update@main

      - name: Cleanup microsoft-msuc-data-* images
        run: vuls-data-update dotgit registry ls --repositories "ghcr.io/vulsio/vuls-data-db" --tagged-only --token ${{ secrets.GITHUB_TOKEN }} | jq -r '.[] | select(.name | startswith("ghcr.io/vulsio/vuls-data-db:microsoft-msuc-data-")) | .digest' | xargs -I {} vuls-data-update dotgit registry delete --token ${{ secrets.GITHUB_TOKEN }} ghcr.io/vulsio/vuls-data-db@{}
