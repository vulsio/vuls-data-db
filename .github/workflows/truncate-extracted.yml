name: Truncate Extracted

on:
  workflow_run:
    workflows: [Extract All]
    types:
      - completed
  workflow_dispatch:

permissions: {}

jobs:
  truncate-extracted:
    strategy:
      fail-fast: false
      matrix:
        target:
          - alma-errata
          - alma-osv
          - alpine-osv
          - alpine-secdb
          - amazon
          - arch
          - cargo-ghsa
          - cisa-kev
          - cisco-json
          - debian-security-tracker-salsa
          - eol
          - enisa-euvd-list
          - enisa-kev
          - epss
          - exploit-exploitdb
          - exploit-github
          - exploit-inthewild
          - exploit-trickest
          - fedora-api
          - fortinet-csaf
          - fortinet-cvrf
          - freebsd
          - jvn-feed-detail
          - jvn-feed-rss
          - microsoft-bulletin
          - microsoft-cvrf
          - microsoft-msuc
          - microsoft-wsusscn2
          - mitre-attack
          - mitre-capec
          - mitre-cve-v5
          - mitre-cwe
          - msf
          - nuclei-repository
          - nvd-api-cve
          - nvd-feed-cve-v2
          - oracle-linux
          - paloalto-json
          - redhat-cve
          - redhat-csaf
          - redhat-csaf-rhel
          - redhat-oval-v1
          - redhat-oval-v1-rhel
          - redhat-oval-v2
          - redhat-oval-v2-rhel
          - redhat-vex-v1
          - redhat-vex-v1-rhel
          - redhat-vex-v2
          - redhat-vex-v2-rhel
          - rocky-errata
          - suse-oval
          - ubuntu-cve-tracker
          - vulncheck-kev
    uses: ./.github/workflows/truncate.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: vuls-data-extracted-${{ matrix.target }}
      threshold-mb: 1024
      log-ratio: 0.8
