name: Truncate Extracted

on:
  workflow_run:
    workflows: [Extract All]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  truncate-extracted:
    strategy:
      fail-fast: false
      matrix:
        target:
          - alma-errata
          - alma-osv
          - alpine-osv
          - alpine-secdb
          - amazon
          - arch
          - cargo-ghsa
          - cisa-kev
          - debian-security-tracker-salsa
          - eol
          - enisa-kev
          - epss
          - exploit-exploitdb
          - exploit-github
          - exploit-inthewild
          - exploit-trickest
          - fedora-api
          - freebsd
          - microsoft-bulletin
          - microsoft-cvrf
          - microsoft-msuc
          - microsoft-wsusscn2
          - mitre-v5
          - msf
          - nuclei-repository
          - nvd-api-cve
          - oracle-linux
          - redhat-cve
          - redhat-csaf
          - redhat-csaf-rhel
          - redhat-ovalv1
          - redhat-ovalv1-rhel
          - redhat-ovalv2
          - redhat-ovalv2-rhel
          - redhat-vex
          - redhat-vex-rhel
          - rocky-errata
          - suse-oval
          - ubuntu-cve-tracker
          - vulncheck-kev
    uses: ./.github/workflows/truncate.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: vuls-data-extracted-${{ matrix.target }}
      threshold-mb: 1024
      log-ratio: 0.8
