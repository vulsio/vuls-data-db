name: Extract RedHat RHEL Only (OVALv2)

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      branch:
        required: true
        type: choice
        options:
          - main
          - nightly

permissions: {}

jobs:
  extract:
    name: Extract vuls-data-extracted-redhat-oval-v2-rhel@${{ inputs.branch }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      - name: Set global git config
        run: |
          git config --global gc.auto 0
          git config --global maintenance.auto false
          git config --global init.defaultBranch main
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: MaineK00n/vuls-data-update
          ref: ${{ inputs.branch }}

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Install vuls-data-update
        run: go install ./cmd/vuls-data-update

      - name: Pull ghcr.io/${{ github.repository }}:vuls-data-raw-redhat-oval-v2
        run: vuls-data-update dotgit pull --dir . --checkout main --restore ghcr.io/${{ github.repository }}:vuls-data-raw-redhat-oval-v2

      - name: Remove unnecessary streams
        run: |
          rm -rf ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-oval-v2/5
          find ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-oval-v2/6 -mindepth 1 -maxdepth 1 ! -name 'rhel-6-including-unpatched' ! -name 'rhel-6-extras-including-unpatched' ! -name 'rhel-6-supplementary' ! -name 'rhel-6-els' | xargs rm -rf
          find ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-oval-v2/7 -mindepth 1 -maxdepth 1 ! -name 'rhel-7-including-unpatched' ! -name 'rhel-7-extras-including-unpatched' ! -name 'rhel-7-supplementary' | xargs rm -rf
          find ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-oval-v2/8 -mindepth 1 -maxdepth 1 ! -name 'rhel-8-including-unpatched' | xargs rm -rf
          find ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-oval-v2/9 -mindepth 1 -maxdepth 1 ! -name 'rhel-9-including-unpatched' | xargs rm -rf

      - name: Pull ghcr.io/${{ github.repository }}:vuls-data-raw-redhat-repository-to-cpe
        run: vuls-data-update dotgit pull --dir . --checkout main --restore ghcr.io/${{ github.repository }}:vuls-data-raw-redhat-repository-to-cpe

      - name: Replace empty repository-to-cpe data
        run: |
          echo "{}" > ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-repository-to-cpe/repository-to-cpe.json

      - name: Pull ghcr.io/${{ github.repository }}:vuls-data-extracted-redhat-oval-v2-rhel
        run: vuls-data-update dotgit pull --dir . --checkout ${{ inputs.branch }} ghcr.io/${{ github.repository }}:vuls-data-extracted-redhat-oval-v2-rhel

      - name: Extract
        run: vuls-data-update extract redhat-oval-v2 --dir ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-oval-v2 ghcr.io/${{ github.repository }}/vuls-data-raw-redhat-repository-to-cpe

      - name: Set Git remote
        run: |
          if git -C ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel remote | grep -q "^origin$"; then
            git -C ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel remote set-url origin ghcr.io/${{ github.repository }}:vuls-data-extracted-redhat-oval-v2-rhel
          else
            git -C ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel remote add origin ghcr.io/${{ github.repository }}:vuls-data-extracted-redhat-oval-v2-rhel
          fi

      - name: Commit
        run: |
          if [[ -n $(git -C ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel status --porcelain) ]]; then
            git -C ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel add .
            git -C ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel commit -m "update" -m "GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ job.check_run_id }}"
          fi

      - name: Create dotgit tarball
        run: vuls-data-update dotgit compress ghcr.io/${{ github.repository }}/vuls-data-extracted-redhat-oval-v2-rhel

      - name: Push ghcr.io/${{ github.repository }}:vuls-data-extracted-redhat-oval-v2-rhel
        run: vuls-data-update dotgit registry push --force --token ${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ github.repository }}:vuls-data-extracted-redhat-oval-v2-rhel vuls-data-extracted-redhat-oval-v2-rhel.tar.zst
