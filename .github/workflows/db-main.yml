name: DB

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      db_change_rate_threshold:
        description: |
          `vuls diff db` default change rate (%) threshold per ecosystem;
          diff fails if exceeded. Leave empty to use the build job's
          DB_CHANGE_RATE_THRESHOLD env; a value here replaces it for this
          dispatch only.
        required: false
        type: string
        default: ""
      db_change_rate_threshold_overrides:
        description: |
          Per-ecosystem overrides of `vuls diff db` threshold, as
          multi-line "<ecosystem>=<rate>" entries. Leave empty to use the
          persistent list in the build job's
          DB_CHANGE_RATE_THRESHOLD_OVERRIDES env; a non-empty value here
          replaces it for this dispatch only. A whitespace-only value
          still counts as non-empty, so it replaces the env list with
          nothing — use it to disable all persistent overrides for a
          single dispatch. Blank/whitespace-only lines are dropped;
          per-entry whitespace is trimmed by vuls2.
        required: false
        type: string
        default: ""
      detection_change_rate_threshold:
        description: |
          `vuls diff detection` default change rate (%) threshold per
          scan result; diff fails if exceeded. Leave empty to use the
          build job's DETECTION_CHANGE_RATE_THRESHOLD env; a value here
          replaces it for this dispatch only.
        required: false
        type: string
        default: ""
      detection_change_rate_threshold_overrides:
        description: |
          Per-scan-result-file overrides of `vuls diff detection`
          threshold, as multi-line "<file-basename>=<rate>" entries.
          Leave empty to use the persistent list in the build job's
          DETECTION_CHANGE_RATE_THRESHOLD_OVERRIDES env; a non-empty
          value here replaces it for this dispatch only. A
          whitespace-only value still counts as non-empty, so it
          replaces the env list with nothing — use it to disable all
          persistent overrides for a single dispatch.
          Blank/whitespace-only lines are dropped; per-entry whitespace
          is trimmed by vuls2.
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  build:
    name: build vuls.db
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
      # Persistent diff-guard threshold config — the single source of
      # truth, applied to BOTH scheduled and manually-dispatched runs.
      # workflow_dispatch input defaults are NOT visible to `schedule`
      # events, so the `Run diff guard` step falls back to these env
      # values whenever no dispatch input is supplied; a dispatch input,
      # when supplied, replaces the corresponding value for that run.
      # Default per-target change-rate thresholds (%).
      DB_CHANGE_RATE_THRESHOLD: "10"
      DETECTION_CHANGE_RATE_THRESHOLD: "5"
      # Per-target threshold overrides. Each entry covers recurring
      # upstream-driven churn (new-distro / recent-release / small-
      # baseline cycles) surfaced by DB (db-main) diff-guard failures;
      # entries are added incrementally as new sources of churn appear.
      # Run `git blame` on these lines for the commit that introduced
      # each entry and its rationale. `#` comments are NOT allowed
      # inside these lists (vuls2's override parser would reject them).
      DB_CHANGE_RATE_THRESHOLD_OVERRIDES: |
        ubuntu:26.04=30
        ubuntu:snap=30
        microsoft=35
        fedora:45=50
      DETECTION_CHANGE_RATE_THRESHOLD_OVERRIDES: |
        debian_13=20
        ubuntu_2604=50
        rocky_10=20
        windows_7=10
        windows_81=10
        windows_10_1709=10
        windows_10_1803=10
        windows_10_1809=10
        windows_10_1903=10
        windows_10_1909=10
        windows_10_2004=10
        windows_10_20h2=10
        windows_10_21h1=10
        windows_10_21h2=10
        windows_10_21h2_old=10
        windows_10_22h2=10
        windows_11_21h2=10
        windows_11_22h2=10
        windows_11_23h2=20
        windows_11_24h2=20
        windows_11_25h2=20
        windows_server_2008=10
        windows_server_2008_r2=10
        windows_server_2012=10
        windows_server_2012_r2=10
        windows_server_2016=10
        windows_server_2019=10
        windows_server_2022=20
        windows_server_2022_sql_server_2019=20
        windows_server_2025=20
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "stable"
          cache: false

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq zstd

      - name: Install vuls-data-update
        run: go install github.com/MaineK00n/vuls-data-update/cmd/vuls-data-update@main

      - name: Install vuls
        run: go install github.com/MaineK00n/vuls2/cmd/vuls@main

      - name: Build DB
        run: make -f db-main.mk db-build BRANCH=main DBPATH=./vuls.db

      - name: Save vuls.db schema_version
        id: save_schema_version
        run: echo "schema_version=$(vuls db search metadata --dbpath ./vuls.db | jq .schema_version)" >> "$GITHUB_OUTPUT"

      - name: Compact vuls.db
        run: vuls db compress --dbpath ./vuls.db

      # Design: "always push tagless, operate by digest, promote to :latest/:schema_version only on pass".
      # The candidate manifest is pushed BEFORE the guard runs so that a
      # failing build remains pullable by digest for investigation; the
      # :latest and :<schema_version> tags are moved onto the verified digest
      # only when the guard step below passes.
      - name: Push vuls.db to GHCR (tagless, digest-only)
        id: push
        env:
          SCHEMA_VERSION: ${{ steps.save_schema_version.outputs.schema_version }}
        run: |
          set -euo pipefail
          digest=$(vuls db push --token "${{ secrets.GITHUB_TOKEN }}" ghcr.io/vulsio/vuls-nightly-db ./vuls.db.zst)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Pushed candidate image (untagged, digest-only)"
            echo '```text'
            echo "digest ref : ghcr.io/vulsio/vuls-nightly-db@${digest}"
            echo '```'
            echo "Image is always pushed before the diff guard runs; a failing"
            echo "build stays pullable by digest for investigation."
            echo ""
            echo "If the diff guard fails and an operator decides the candidate is"
            echo "safe after inspecting the diff, promote it via the promote-digest"
            echo "workflow (records an audit trail as an Actions run):"
            echo '```sh'
            echo " gh workflow run promote-digest.yml -R ${{ github.repository }} -f digest=${digest} -f tag=${SCHEMA_VERSION}"
            echo '```'
            echo '```sh'
            echo " gh workflow run promote-digest.yml -R ${{ github.repository }} -f digest=${digest} -f tag=latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Runs on every scheduled and manually dispatched invocation.
      - name: Run diff guard
        # On scheduled runs github.event.inputs.* is unset/null, so the
        # `|| env.*` fallbacks supply every value from the job-level env
        # block (the single source of truth). A workflow_dispatch input,
        # when supplied, replaces the corresponding env value for that
        # run only.
        uses: ./.github/actions/diff-guard
        with:
          target_db: ./vuls.db
          baseline_repository: ghcr.io/vulsio/vuls-nightly-db:${{ steps.save_schema_version.outputs.schema_version }}
          db_change_rate_threshold: ${{ github.event.inputs.db_change_rate_threshold || env.DB_CHANGE_RATE_THRESHOLD }}
          db_change_rate_threshold_overrides: ${{ github.event.inputs.db_change_rate_threshold_overrides || env.DB_CHANGE_RATE_THRESHOLD_OVERRIDES }}
          detection_change_rate_threshold: ${{ github.event.inputs.detection_change_rate_threshold || env.DETECTION_CHANGE_RATE_THRESHOLD }}
          detection_change_rate_threshold_overrides: ${{ github.event.inputs.detection_change_rate_threshold_overrides || env.DETECTION_CHANGE_RATE_THRESHOLD_OVERRIDES }}

      # Guard passed: attach :latest and :<schema_version> to the verified digest.
      # If the guard fails this step is skipped and the tags stay pointing at
      # the previous verified digest.
      - name: Promote digest to :latest and :<schema_version>
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          SCHEMA_VERSION: ${{ steps.save_schema_version.outputs.schema_version }}
        run: |
          set -euo pipefail
          vuls-data-update dotgit registry tag \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            "ghcr.io/vulsio/vuls-nightly-db@${DIGEST}" latest
          vuls-data-update dotgit registry tag \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            "ghcr.io/vulsio/vuls-nightly-db@${DIGEST}" "${SCHEMA_VERSION}"
          {
            echo "## Promoted to :latest and :${SCHEMA_VERSION}"
            echo '```text'
            echo "ref        : ghcr.io/vulsio/vuls-nightly-db:latest"
            echo "ref        : ghcr.io/vulsio/vuls-nightly-db:${SCHEMA_VERSION}"
            echo "digest ref : ghcr.io/vulsio/vuls-nightly-db@${DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  action-run-summary:
    name: Action run summary
    if: ${{ success() || failure() }}
    needs: [build]
    uses: ./.github/workflows/action-run-summary.yml
    permissions:
      contents: read
      actions: read
