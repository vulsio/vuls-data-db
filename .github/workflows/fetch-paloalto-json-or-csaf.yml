name: Fetch Palo Alto (JSON, CSAF)

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options:
          - paloalto-json
          - paloalto-csaf

permissions: {}

jobs:
  fetch:
    name: Fetch vuls-data-raw-${{ inputs.target }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@90e01b21170618765a73370fcc3abbd1684a7793 # v5
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"

      - name: Set global git config
        run: |
          git config --global gc.auto 0
          git config --global maintenance.auto false
          git config --global init.defaultBranch main
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Check out code into the Go module directory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: MaineK00n/vuls-data-update
          ref: main

      - name: Set up Go 1.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Install vuls-data-update
        run: go install ./cmd/vuls-data-update

      - name: Pull ghcr.io/${{ github.repository }}:vuls-data-raw-paloalto-list
        run: vuls-data-update dotgit pull --dir . --checkout main --restore ghcr.io/${{ github.repository }}:vuls-data-raw-paloalto-list

      - name: Pull ghcr.io/${{ github.repository }}:vuls-data-raw-${{ inputs.target }}
        run: vuls-data-update dotgit pull --dir . --checkout main ghcr.io/${{ github.repository }}:vuls-data-raw-${{ inputs.target }}

      - name: Fetch
        run: vuls-data-update fetch ${{ inputs.target }} --dir ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} $(find ghcr.io/${{ github.repository }}/vuls-data-raw-paloalto-list -name "*.json" | xargs -I {} basename {} .json | tr '\n' ' ')

      # vuls-data-update's json fetcher skips advisories whose per-advisory endpoint
      # returns 404 (an upstream regression on ~40 older advisories). Those files would
      # then be dropped from this commit. Restore the last-known-good copy from history
      # for any advisory that is still listed upstream but missing from the freshly-fetched
      # tree, so the dataset stays complete instead of losing the 404'd advisories.
      #
      # json only: csaf returns 404 for the normal "no CSAF generated for this advisory"
      # state (not a regression), so restoring csaf files from history would resurrect
      # intentionally-absent documents and prevent expected deletions.
      - name: Restore advisories dropped by upstream 404 (recover last-known-good from history)
        if: ${{ inputs.target == 'paloalto-json' }}
        shell: bash
        run: |
          dir="ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }}"
          # Nothing to recover from on a freshly-initialized repo with no commits yet.
          if ! git -C "$dir" rev-parse --verify -q HEAD >/dev/null; then
            echo "no HEAD commit in $dir; nothing to restore"
            exit 0
          fi
          # Build the set of currently-listed advisory IDs once for O(1) membership.
          declare -A listed
          while IFS= read -r id; do
            listed["$id"]=1
          done < <(find "ghcr.io/${{ github.repository }}/vuls-data-raw-paloalto-list" -name '*.json' -exec basename {} .json \;)
          restored=0
          while IFS= read -r rel; do
            id="$(basename "$rel" .json)"
            if [ ! -f "$dir/$rel" ] && [ -n "${listed[$id]:-}" ]; then
              git -C "$dir" restore --source=HEAD -- "$rel"
              restored=$((restored + 1))
            fi
          done < <(git -C "$dir" ls-tree -r --name-only HEAD -- '*.json')
          echo "restored ${restored} advisories dropped by upstream 404 (recovered last-known-good from HEAD)"

      - name: Set Git remote
        run: |
          if git -C ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} remote | grep -q "^origin$"; then
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} remote set-url origin ghcr.io/${{ github.repository }}:vuls-data-raw-${{ inputs.target }}
          else
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} remote add origin ghcr.io/${{ github.repository }}:vuls-data-raw-${{ inputs.target }}
          fi

      - name: Commit
        run: |
          if [[ -n $(git -C ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} status --porcelain) ]]; then
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} add .
            git -C ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }} commit -m "update" -m "GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ job.check_run_id }}"
          fi

      - name: Create dotgit tarball
        run: vuls-data-update dotgit compress ghcr.io/${{ github.repository }}/vuls-data-raw-${{ inputs.target }}

      - name: Push ghcr.io/${{ github.repository }}:vuls-data-raw-${{ inputs.target }}
        run: vuls-data-update dotgit registry push --force --token ${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ github.repository }}:vuls-data-raw-${{ inputs.target }} vuls-data-raw-${{ inputs.target }}.tar.zst
